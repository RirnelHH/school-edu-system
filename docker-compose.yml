version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: school_edu_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: school_edu
      MYSQL_USER: school_edu
      MYSQL_PASSWORD: school_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_edu_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://school_edu:school_password@db:3306/school_edu?schema=public&sslmode=prefer"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      NODE_ENV: production
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: school_edu_frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data:
