name: CI/CD 测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 前端单元测试
  frontend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: cd frontend && npm ci
      
      - name: Run unit tests
        run: cd frontend && npm run test -- --run

  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: cd backend && npm ci
      
      - name: Setup MySQL
        run: |
          sudo service mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS school_edu;"
          mysql -e "CREATE USER IF NOT EXISTS 'school_edu'@'localhost' IDENTIFIED BY 'school_password';"
          mysql -e "GRANT ALL PRIVILEGES ON school_edu.* TO 'school_edu'@'localhost';"
      
      - name: Run backend tests
        run: cd backend && npm test

  # 前端 E2E 测试
  frontend-e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: cd frontend && npm ci
      
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium
      
      - name: Start backend
        run: |
          cd backend
          npm ci
          npx prisma generate
          service mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS school_edu;"
          mysql -e "CREATE USER IF NOT EXISTS 'school_edu'@'localhost' IDENTIFIED BY 'school_password';"
          mysql -e "GRANT ALL PRIVILEGES ON school_edu.* TO 'school_edu'@'localhost';"
          nohup npm run start:dev > /tmp/backend.log 2>&1 &
          sleep 10
      
      - name: Start frontend
        run: |
          cd frontend
          nohup npm run dev -- --port 8080 > /tmp/frontend.log 2>&1 &
          sleep 5
      
      - name: Run E2E tests
        run: cd frontend && npx playwright test
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
